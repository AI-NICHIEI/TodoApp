<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理者画面 - 日榮中間処理場</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#EEF9EE;min-height:100vh}
#app{max-width:520px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 20px rgba(0,0,0,.08)}
.hdr{background:linear-gradient(135deg,#7DBF3A,#5BB8E8);padding:16px 18px;color:#fff}
.hdr h1{font-size:15px;font-weight:700;line-height:1.4}
.hdr p{font-size:11px;opacity:.85;margin-top:4px}
.sync{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;float:right;margin-top:-2px}
.sync.ok{background:rgba(255,255,255,.25);color:#fff}
.sync.err{background:#FFCECE;color:#C02020}
.sync.loading{background:rgba(255,255,255,.15);color:#fff}
.wknav{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:#E8F7D0;border-bottom:2px solid #A8D96A}
.wkbtn{background:#7DBF3A;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer}
.wkbtn:disabled{background:#ccc}
.dtabs{display:flex;background:#fff;border-bottom:2px solid #A8D96A;overflow-x:auto}
.dtab{flex:1;min-width:60px;padding:8px 3px;text-align:center;cursor:pointer;border:none;background:transparent;border-bottom:3px solid transparent;margin-bottom:-2px}
.dtab.on{border-bottom-color:#7DBF3A;background:#E8F7D0}
.dn{font-size:10px;font-weight:700;color:#999}
.dtab.on .dn{color:#5A9A1F}
.dnum{font-size:19px;font-weight:700;color:#333;margin:2px 0}
.dtab.on .dnum{color:#5A9A1F}
.dbk{font-size:10px;font-weight:700;color:#fff;background:#7DBF3A;border-radius:10px;padding:1px 6px;display:inline-block}
.dbk.z{background:#ddd;color:#999}
.wrap{padding:13px 14px}
.day-title{font-size:15px;font-weight:700;color:#5A9A1F;margin-bottom:10px}
.total-badge{background:#E8F7D0;border:2px solid #A8D96A;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;font-weight:700;color:#5A9A1F;display:flex;align-items:center;gap:8px}
/* タイムライン形式 */
.slot-row{display:flex;align-items:center;border-radius:11px;padding:10px 12px;margin-bottom:7px;gap:10px}
.slot-row.booked{background:#E8F7D0;border:2px solid #A8D96A}
.slot-row.booked.s15{background:#D6F0FF;border-color:#89CFEE}
.slot-row.empty{background:#F8F8F8;border:2px solid #E8E8E8}
.sl-time{font-size:13px;font-weight:700;min-width:48px}
.slot-row.booked .sl-time{color:#5A9A1F}
.slot-row.booked.s15 .sl-time{color:#1A6E9A}
.slot-row.empty .sl-time{color:#bbb}
.sl-dur{font-size:10px;font-weight:700;border-radius:8px;padding:2px 7px;white-space:nowrap}
.slot-row.booked .sl-dur{background:#A8D96A;color:#fff}
.slot-row.booked.s15 .sl-dur{background:#89CFEE;color:#fff}
.slot-row.empty .sl-dur{background:#E0E0E0;color:#aaa}
.sl-co{font-size:13px;font-weight:600;flex:1}
.slot-row.booked .sl-co{color:#333}
.slot-row.empty .sl-co{color:#ccc;font-style:italic}
.sl-circle{font-size:18px;color:#7DBF3A}
.sl-del{background:#FFE8E8;color:#E05B5B;border:1.5px solid #FFBBBB;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.52);display:flex;align-items:center;justify-content:center;z-index:100;padding:18px}
.mbox{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:340px;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.mttl{font-size:16px;font-weight:700;color:#E05B5B;margin-bottom:10px}
.mbtns{display:flex;gap:8px;margin-top:14px}
.mbtns button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer}
.mok{background:#FFE8E8;color:#E05B5B;border:2px solid #FFBBBB}
.mng{background:#EFEFEF;color:#666}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <span class="sync loading" id="sync-badge"><span class="spinner"></span> 接続中</span>
    <h1>🛡 管理者画面<br>🚛 日榮中間処理場 搬入予約</h1>
    <p>予約一覧の確認・削除ができます</p>
  </div>
  <div class="wknav">
    <button class="wkbtn" id="pb" onclick="chW(-1)" disabled>◀ 前週</button>
    <div style="font-size:13px;font-weight:700;color:#5A9A1F" id="wlbl"></div>
    <button class="wkbtn" id="nb" onclick="chW(1)">次週 ▶</button>
  </div>
  <div class="dtabs" id="dtabs"></div>
  <div class="wrap" id="wrap"></div>
  <div id="modal"></div>
</div>
<script>
const SUPABASE_URL="https://uzjftccxoipspazrtuvl.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6amZ0Y2N4b2lwc3BhenJ0dXZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NjQ1NTYsImV4cCI6MjA5NTQ0MDU1Nn0.qsXWRTk2hwK4JtIBoNuq-8OXPJYb3-Q4BPugBg2tzd8";
const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:false}});

var R={},wk=1,sd=0;
var DN=['月','火','水','木','金','土'];
var SLOTS=[
  {t:'08:00',dur:'30'},{t:'08:30',dur:'30'},{t:'09:00',dur:'30'},{t:'09:30',dur:'30'},
  {t:'10:00',dur:'30'},{t:'10:15',dur:'15'},{t:'10:30',dur:'30'},
  {t:'11:00',dur:'30'},{t:'11:15',dur:'15'},{t:'11:30',dur:'30'},
  {t:'13:00',dur:'30'},{t:'13:30',dur:'30'},{t:'13:45',dur:'15'},
  {t:'14:00',dur:'30'},{t:'14:30',dur:'30'},{t:'14:45',dur:'15'},
  {t:'15:00',dur:'30'},{t:'15:30',dur:'30'},{t:'16:00',dur:'30'}
];

function gw(o){var t=new Date();t.setHours(0,0,0,0);var dw=t.getDay(),df=dw===0?-6:1-dw,mn=new Date(t);mn.setDate(t.getDate()+df+o*7);return Array.from({length:6},function(_,i){var d=new Date(mn);d.setDate(mn.getDate()+i);return d;});}
function fmt(d){return d.toISOString().split('T')[0];}
function fj(d){return(d.getMonth()+1)+'月'+d.getDate()+'日';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function cntBooked(ds){return SLOTS.filter(function(s){return!!R[ds+'_'+s.t];}).length;}
function setBadge(s){var b=document.getElementById('sync-badge');if(!b)return;if(s==='ok'){b.className='sync ok';b.innerHTML='☁️ 同期済み';}else if(s==='err'){b.className='sync err';b.innerHTML='⚠️ エラー';}else{b.className='sync loading';b.innerHTML='<span class="spinner"></span> 接続中';}}

async function loadAll(){
  setBadge('loading');
  try{
    var days=gw(wk),from=fmt(days[0]),to=fmt(days[5]);
    var{data,error}=await db.from('reservations').select('*').gte('date',from).lte('date',to);
    if(error)throw error;
    R={};(data||[]).forEach(function(r){R[r.date+'_'+r.time_slot]={co:r.company,dur:r.duration,id:r.id};});
    setBadge('ok');
  }catch(e){console.error(e);setBadge('err');}
  rTabs();rList();
}
function chW(d){wk+=d;sd=0;loadAll();}
function upd(){var days=gw(wk);document.getElementById('wlbl').textContent=fj(days[0])+'〜'+fj(days[5]);document.getElementById('pb').disabled=wk<=1;document.getElementById('nb').disabled=wk>=4;}
function rTabs(){
  upd();var days=gw(wk),h='';
  days.forEach(function(d,i){
    var ds=fmt(d),bk=cntBooked(ds);
    h+='<button class="dtab'+(i===sd?' on':'')+'" onclick="selD('+i+')">'
      +'<div class="dn">'+DN[i]+'</div><div class="dnum">'+d.getDate()+'</div>'
      +'<div class="dbk'+(bk===0?' z':'')+'">'+bk+'件</div></button>';
  });
  document.getElementById('dtabs').innerHTML=h;
}
function selD(i){sd=i;rTabs();rList();}

function rList(){
  var days=gw(wk),day=days[sd],ds=fmt(day);
  var bookedCnt=cntBooked(ds);
  var h='<div class="day-title">📅 '+fj(day)+'（'+DN[sd]+'）</div>';
  h+='<div class="total-badge">📋 予約 '+bookedCnt+' 件 ／ 空き '+(SLOTS.length-bookedCnt)+' 枠</div>';

  SLOTS.forEach(function(s){
    var r=R[ds+'_'+s.t];
    var is15=s.dur==='15';
    if(r){
      // 予約あり
      h+='<div class="slot-row booked'+(is15?' s15':'')+'">'
        +'<div class="sl-time">'+s.t+'</div>'
        +'<div class="sl-dur">'+s.dur+'分</div>'
        +'<div class="sl-co">🏢 '+esc(r.co)+'</div>'
        +'<button class="sl-del" onclick="confirmDel(\''+ds+'\',\''+s.t+'\')">🗑 削除</button>'
        +'</div>';
    } else {
      // 空き
      h+='<div class="slot-row empty'+(is15?' s15':'')+'">'
        +'<div class="sl-time">'+s.t+'</div>'
        +'<div class="sl-dur">'+s.dur+'分</div>'
        +'<div class="sl-co">空き</div>'
        +'<div class="sl-circle">○</div>'
        +'</div>';
    }
  });

  document.getElementById('wrap').innerHTML=h;
}

function confirmDel(ds,t){
  var r=R[ds+'_'+t];if(!r)return;
  var p=ds.split('-'),m=parseInt(p[1]),d=parseInt(p[2]);
  document.getElementById('modal').innerHTML=
    '<div class="mbg" onclick="clM(event)"><div class="mbox">'
    +'<div class="mttl">🗑 予約を削除しますか？</div>'
    +'<div style="background:#E8F7D0;border-radius:9px;padding:12px;font-size:13px;color:#555;line-height:1.7">'
    +'📅 '+m+'月'+d+'日（'+DN[sd]+'）<br>🕐 '+t+'〜<br>🏢 '+esc(r.co)+'</div>'
    +'<div class="mbtns">'
    +'<button class="mng" onclick="clM()">キャンセル</button>'
    +'<button class="mok" id="del-btn" onclick="doDel(\''+ds+'\',\''+t+'\')">削除する</button>'
    +'</div></div></div>';
}
async function doDel(ds,t){
  var r=R[ds+'_'+t];if(!r)return;
  var btn=document.getElementById('del-btn');if(btn){btn.disabled=true;btn.textContent='削除中...';}
  try{
    var{error}=await db.from('reservations').delete().eq('id',r.id);
    if(error)throw error;
    delete R[ds+'_'+t];clM();rTabs();rList();
  }catch(e){alert('削除エラー: '+e.message);if(btn){btn.disabled=false;btn.textContent='削除する';}}
}
function clM(e){if(!e||e.target.className==='mbg')document.getElementById('modal').innerHTML='';}
loadAll();
</script>
</body>
</html>
