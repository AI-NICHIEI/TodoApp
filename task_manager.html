<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会議タスク管理 - 産廃・砕石</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --main:#7DBF3A;
  --main-dark:#5A9A1F;
  --main-light:#E8F7D0;
  --main-mid:#A8D96A;
  --accent:#B5E04A;
  --yellow:#F6F7A8;
  --peach:#FFE8D6;
  --sky:#D6EFFF;
  --lavender:#EAD6FF;
  --mint:#D0F5E8;
  --red:#E05B5B;--red-light:#FFE8E8;
  --amber:#D4830A;--amber-light:#FFF2D6;
  --gray:#7A7A6E;--gray-light:#F0EFE6;
  --border:#D8EDB8;
  --bg:#F2FAE6;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#E8F7D0 0%,#F2FAE6 50%,#EEFADB 100%);min-height:100vh}
#app{max-width:100%;background:rgba(242,250,230,0.85);min-height:100vh;position:relative}

/* ヘッダー */
.header{background:linear-gradient(120deg,var(--main) 0%,#9DD44A 100%);padding:16px 20px 14px;box-shadow:0 2px 12px rgba(125,191,58,.25)}
.header h1{font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;text-shadow:0 1px 3px rgba(0,0,0,.15)}
.header p{font-size:12px;color:rgba(255,255,255,.85);margin-top:3px}

/* タブ */
.tab-bar{display:flex;background:#fff;border-bottom:2px solid var(--border);overflow-x:auto}
.tab{flex:1;min-width:60px;padding:10px 4px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;color:#aaa;border:none;background:transparent;border-bottom:3px solid transparent;margin-bottom:-2px;display:flex;flex-direction:column;align-items:center;gap:2px;white-space:nowrap}
.tab i{font-size:17px}
.tab.active{color:var(--main-dark);border-bottom-color:var(--main)}

.section{padding:14px}

/* フィルター */
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-chip{padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:#fff;color:#666;transition:all .15s}
.filter-chip.active{background:var(--main);color:#fff;border-color:var(--main)}

/* サマリー */
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sum-card{background:#fff;border-radius:14px;border:2px solid var(--border);padding:12px;text-align:center;box-shadow:0 2px 8px rgba(125,191,58,.1)}
.sum-num{font-size:28px;font-weight:700}
.sum-lbl{font-size:11px;color:#888;margin-top:2px;font-weight:600}

/* タスクカード */
.status-group{margin-bottom:16px}
.status-label{font-size:12px;font-weight:700;color:#888;margin-bottom:7px;padding-left:2px;display:flex;align-items:center;gap:5px}
.status-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-todo{background:#C8C8B8}
.dot-progress{background:var(--main)}
.dot-done{background:#A0C878}
.task-card{background:#fff;border-radius:14px;border:2px solid var(--border);padding:13px 14px;margin-bottom:9px;cursor:pointer;transition:transform .1s,box-shadow .1s;box-shadow:0 2px 8px rgba(125,191,58,.08)}
.task-card:active{transform:scale(.98)}
.task-card.urgent{border-left:5px solid #E05B5B;background:var(--red-light);border-color:#FFBBBB}
.task-card.warning{border-left:5px solid #F0B030;background:var(--amber-light);border-color:#FFD98A}
.task-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.task-title{font-size:15px;font-weight:600;color:#333;line-height:1.45;flex:1}
.task-card.urgent .task-title{color:#C02020}
.days-badge{font-size:12px;font-weight:700;border-radius:20px;padding:4px 10px;white-space:nowrap;flex-shrink:0}
.days-badge.red{background:#FFCECE;color:#C02020}
.days-badge.amber{background:#FFE0A0;color:#8B5500}
.days-badge.green{background:var(--main-light);color:var(--main-dark)}
.days-badge.gray{background:#E8E8DC;color:#666}
.task-meta{display:flex;gap:8px;margin-top:9px;align-items:center;flex-wrap:wrap}
.meta-chip{font-size:12px;color:#888;display:flex;align-items:center;gap:4px}
.meta-chip i{font-size:15px}
.avatar{width:24px;height:24px;border-radius:50%;background:var(--main-light);color:var(--main-dark);font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid var(--main-mid)}
.meeting-badge{font-size:11px;color:var(--main-dark);display:flex;align-items:center;gap:3px;font-weight:600;background:var(--main-light);border-radius:10px;padding:2px 7px}

/* ボタン */
.big-btn{width:100%;padding:15px;border-radius:14px;font-size:15px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:10px;transition:opacity .15s,transform .1s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.big-btn:active{opacity:.85;transform:scale(.98)}
.btn-primary{background:linear-gradient(120deg,var(--main) 0%,#9DD44A 100%);color:#fff}
.btn-secondary{background:var(--sky);color:#2266AA;border:2px solid #A8D4F8}
.btn-danger{background:var(--red-light);color:#C02020;border:2px solid #FFBBBB}
.btn-gray{background:var(--gray-light);color:#666;border:2px solid #DDD}
.btn-yellow{background:var(--yellow);color:#6B6B10;border:2px solid #E0E066}

/* カード・フォーム */
.card-box{background:#fff;border-radius:14px;border:2px solid var(--border);padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(125,191,58,.08)}
.card-box h3{font-size:15px;font-weight:700;color:var(--main-dark);margin-bottom:10px;display:flex;align-items:center;gap:7px}
textarea{width:100%;padding:11px;font-size:14px;border-radius:10px;border:2px solid var(--border);background:#FAFEF4;color:#333;resize:vertical;min-height:110px;font-family:inherit;line-height:1.6}
textarea:focus{outline:none;border-color:var(--main)}
.info-card{background:#FAFEF4;border-radius:10px;border:2px solid var(--border);padding:11px;margin-bottom:8px}
.info-label{font-size:11px;color:#999;margin-bottom:2px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.info-val{font-size:14px;font-weight:600;color:#333}
.form-row{margin-bottom:11px}
.form-row label{font-size:13px;color:#666;display:block;margin-bottom:5px;font-weight:700}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:12px;border-radius:10px;border:2px solid var(--border);background:#FAFEF4;color:#333;font-size:15px;font-family:inherit}
.form-row textarea{min-height:90px;resize:vertical}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--main)}

/* スピナー */
.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid var(--main-light);border-top-color:var(--main);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:36px 16px;color:#aaa;font-size:14px}
.empty i{font-size:36px;display:block;margin-bottom:10px;color:#ccc}

/* モーダル */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(80,120,40,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;overflow-y:auto;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:18px;padding:20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;border:2px solid var(--border);box-shadow:0 8px 32px rgba(80,160,40,.15)}

/* 議事録 */
.minutes-card{background:#fff;border-radius:14px;border:2px solid var(--border);padding:14px;margin-bottom:10px;cursor:pointer;transition:transform .1s;box-shadow:0 2px 8px rgba(125,191,58,.08)}
.minutes-card:active{transform:scale(.98)}
.minutes-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.minutes-title{font-size:15px;font-weight:700;color:#333;flex:1;line-height:1.4}
.minutes-meta{display:flex;gap:8px;margin-top:7px;flex-wrap:wrap;align-items:center}
.minutes-preview{font-size:12px;color:#999;margin-top:7px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tag{font-size:11px;font-weight:700;border-radius:20px;padding:3px 9px}
.tag-tasks{background:var(--main-light);color:var(--main-dark)}
.tag-memo{background:var(--gray-light);color:#888}
.minutes-body{font-size:14px;color:#444;line-height:1.8;white-space:pre-wrap;background:#FAFEF4;border-radius:10px;padding:12px;margin-bottom:12px;max-height:300px;overflow-y:auto;border:2px solid var(--border)}
.task-chip{display:inline-flex;align-items:center;gap:5px;background:var(--main-light);color:var(--main-dark);font-size:12px;font-weight:600;border-radius:8px;padding:5px 9px;margin:3px 3px 3px 0;border:1px solid var(--main-mid)}
.minutes-new-btn{background:linear-gradient(120deg,var(--main),#9DD44A);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(125,191,58,.3)}

/* iPad */
@media(min-width:768px){
  #app{max-width:900px;margin:0 auto;box-shadow:0 0 50px rgba(125,191,58,.15)}
  .header{padding:22px 32px 18px}
  .header h1{font-size:22px}
  .header p{font-size:13px}
  .tab{font-size:13px;padding:14px 8px}
  .tab i{font-size:20px}
  .section{padding:20px 28px}
  .filter-chip{font-size:14px;padding:9px 16px}
  .task-card{padding:16px 18px}
  .task-title{font-size:16px}
  .days-badge{font-size:13px;padding:5px 12px}
  .big-btn{font-size:16px;padding:17px}
  .card-box{padding:20px}
  .card-box h3{font-size:16px}
  .form-row input,.form-row select,.form-row textarea{font-size:16px;padding:14px}
  .sum-num{font-size:32px}
  .sum-lbl{font-size:13px}
  .sum-card{padding:14px}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
  .minutes-title{font-size:16px}
  .minutes-card{padding:16px}
  .modal{max-width:520px}
}

/* PC */
@media(min-width:1024px){
  #app{max-width:1100px}
  .header{padding:24px 48px 20px;display:flex;align-items:center}
  .header-text{flex:1}
  .header h1{font-size:24px}
  .tab-bar{padding:0 24px}
  .tab{flex:none;padding:15px 28px;font-size:14px}
  .section{padding:24px 48px}
  .two-col{gap:28px}
  .filter-chip{font-size:15px;padding:10px 20px}
  .task-title{font-size:17px}
  .big-btn{font-size:17px}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-text">
      <h1><i class="ti ti-leaf"></i> 会議タスク管理</h1>
      <p>産業廃棄物処理・砕石販売 現場管理システム</p>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('tasks')"><i class="ti ti-list-check"></i>タスク</button>
    <button class="tab" onclick="switchTab('ai')"><i class="ti ti-sparkles"></i>AI議事録</button>
    <button class="tab" onclick="switchTab('minutes')"><i class="ti ti-notebook"></i>議事録</button>
    <button class="tab" onclick="switchTab('add')"><i class="ti ti-plus"></i>追加</button>
  </div>

  <!-- タスク一覧 -->
  <div id="tab-tasks" class="section">
    <div class="summary-row" id="summary"></div>
    <div class="filter-row" id="filter-row"></div>
    <div class="two-col">
      <div id="task-list-left"></div>
      <div id="task-list-right"></div>
    </div>
    <div id="task-list-single"></div>
  </div>

  <!-- AI議事録入力 -->
  <div id="tab-ai" class="section" style="display:none">
    <div class="two-col">
      <div class="card-box">
        <h3><i class="ti ti-sparkles"></i> 会議メモを議事録として保存</h3>
        <p style="font-size:13px;color:#999;margin-bottom:12px;line-height:1.6">メモを貼り付けると議事録として保存し、AIがタスクを自動抽出します。</p>
        <div class="form-row"><label>会議タイトル</label><input id="meeting-title" type="text" placeholder="例：5月定例会議　産廃部門"></div>
        <div class="form-row"><label>会議日</label><input id="meeting-date" type="date"></div>
        <div class="form-row"><label>参加者（任意）</label><input id="meeting-members" type="text" placeholder="例：園美、吉岡、矢板"></div>
        <div class="form-row"><label>メモ・議事録本文</label>
          <textarea id="minutes-input" placeholder="会議のメモや議事録を自由に入力・貼り付けてください。

例：
・吉岡：今月末までに砕石の在庫確認と発注を完了する
・奈美：3日以内に取引先へ見積書を送付する
・月井：来週金曜日までに車両点検記録を提出すること"></textarea>
        </div>
        <button class="big-btn btn-primary" onclick="saveAndExtract()">
          <i class="ti ti-sparkles"></i> 保存してタスクを自動抽出
        </button>
        <button class="big-btn btn-yellow" onclick="saveMinutesOnly()">
          <i class="ti ti-device-floppy"></i> タスク抽出なしで保存のみ
        </button>
      </div>
      <div id="extracted-results"></div>
    </div>
  </div>

  <!-- 議事録履歴 -->
  <div id="tab-minutes" class="section" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:16px;font-weight:700;color:var(--main-dark)"><i class="ti ti-notebook"></i> 過去の議事録</div>
      <button class="minutes-new-btn" onclick="switchTab('ai')"><i class="ti ti-plus"></i> 新規</button>
    </div>
    <div class="two-col" id="minutes-list"></div>
  </div>

  <!-- 手動追加 -->
  <div id="tab-add" class="section" style="display:none">
    <div style="max-width:560px;margin:0 auto">
      <div class="card-box">
        <h3><i class="ti ti-plus"></i> タスクを手動追加</h3>
        <div class="form-row"><label>タスク内容</label><input id="f-title" type="text" placeholder="例：産廃搬出計画書の作成"></div>
        <div class="form-row"><label>担当者</label>
          <select id="f-person">
            <option>園美</option><option>奈美</option><option>真美</option><option>恵一</option>
            <option>美佳</option><option>矢板</option><option>月井</option><option>北浦</option>
            <option>美咲</option><option>明日香</option><option>関根</option><option>吉岡</option>
            <option>その他</option>
          </select>
        </div>
        <div class="form-row"><label>期限</label><input id="f-due" type="date"></div>
        <div class="form-row"><label>ステータス</label>
          <select id="f-status">
            <option value="todo">未着手</option>
            <option value="progress">進行中</option>
            <option value="done">完了</option>
          </select>
        </div>
        <button class="big-btn btn-primary" onclick="addManualTask()"><i class="ti ti-plus"></i> タスクを追加</button>
      </div>
    </div>
  </div>

  <div id="modal-area"></div>
</div>

<script>
const PEOPLE=['全員','園美','奈美','真美','恵一','美佳','矢板','月井','北浦','美咲','明日香','関根','吉岡'];
let filterPerson='全員';
let tasks=[
  {id:1,title:'産廃搬出計画書の作成',person:'園美',due:'2026-05-28',status:'progress',fromMeeting:false,minutesId:null},
  {id:2,title:'砕石の在庫確認・発注',person:'吉岡',due:'2026-05-31',status:'todo',fromMeeting:false,minutesId:null},
  {id:3,title:'取引先への見積書送付',person:'奈美',due:'2026-05-27',status:'todo',fromMeeting:false,minutesId:null},
  {id:4,title:'車両点検記録の提出',person:'矢板',due:'2026-06-10',status:'todo',fromMeeting:false,minutesId:null},
  {id:5,title:'Q1売上報告書の確認',person:'恵一',due:'2026-05-20',status:'done',fromMeeting:false,minutesId:null},
  {id:6,title:'新規取引先との契約書確認',person:'美佳',due:'2026-06-05',status:'todo',fromMeeting:false,minutesId:null},
];
let nextId=7;
let minutesList=[
  {id:'m1',title:'5月定例会議',date:'2026-05-20',members:'園美、吉岡、奈美、矢板、恵一',body:'・Q1売上は目標比95%。恵一より月末までに分析レポートを提出する。\n・砕石の在庫が残り少ない。吉岡が今月末までに発注を完了すること。\n・新規取引先からの見積依頼あり。奈美が27日までに送付する。\n・産廃搬出の日程調整が必要。園美が計画書を作成し28日までに共有する。',taskIds:[1,2,3,5],savedAt:'2026-05-20T10:30:00'},
  {id:'m2',title:'車両管理ミーティング',date:'2026-05-15',members:'矢板、月井、北浦',body:'・全車両の点検記録が未提出のものがある。矢板が6月10日までに取りまとめて提出すること。\n・北浦の担当車両で軽微な不具合を確認。早急に整備工場へ連絡する。\n・燃費データの集計を月井が担当する。',taskIds:[4],savedAt:'2026-05-15T14:00:00'}
];
let nextMinutesId=3;

function today(){return new Date().toISOString().split('T')[0]}
function daysLeft(due){return Math.ceil((new Date(due)-new Date(today()))/(1000*60*60*24))}
function urgencyClass(due,status){
  if(status==='done')return '';
  const d=daysLeft(due);
  return d<=2?'urgent':d<=5?'warning':'';
}
function daysLabel(due,status){
  if(status==='done')return {cls:'gray',txt:'完了'};
  const d=daysLeft(due);
  if(d<0)return {cls:'red',txt:Math.abs(d)+'日超過'};
  if(d===0)return {cls:'red',txt:'今日締切!'};
  if(d<=2)return {cls:'red',txt:'残'+d+'日'};
  if(d<=5)return {cls:'amber',txt:'残'+d+'日'};
  return {cls:'green',txt:'残'+d+'日'};
}
function statusDot(s){return s==='todo'?'dot-todo':s==='progress'?'dot-progress':'dot-done'}
function statusLabel(s){return s==='todo'?'未着手':s==='progress'?'進行中':'完了'}
function initials(name){return (name||'？').slice(0,2)}
function fmtDate(d){if(!d)return '';const[y,m,dd]=d.split('-');return y+'年'+parseInt(m)+'月'+parseInt(dd)+'日'}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function isWide(){return window.innerWidth>=768}

function renderAll(){renderSummary();renderFilters();renderTasks();renderMinutes()}

function renderSummary(){
  const todo=tasks.filter(t=>t.status==='todo').length;
  const prog=tasks.filter(t=>t.status==='progress').length;
  const done=tasks.filter(t=>t.status==='done').length;
  document.getElementById('summary').innerHTML=
    '<div class="sum-card"><div class="sum-num" style="color:#BBBBAA">'+todo+'</div><div class="sum-lbl">未着手</div></div>'+
    '<div class="sum-card"><div class="sum-num" style="color:var(--main)">'+prog+'</div><div class="sum-lbl">進行中</div></div>'+
    '<div class="sum-card"><div class="sum-num" style="color:#A0C878">'+done+'</div><div class="sum-lbl">完了</div></div>';
}

function renderFilters(){
  document.getElementById('filter-row').innerHTML=PEOPLE.map(p=>
    '<button class="filter-chip '+(filterPerson===p?'active':'')+'" onclick="setFilter(\''+p+'\')">'+p+'</button>'
  ).join('');
}
function setFilter(p){filterPerson=p;renderAll()}

function taskCardHtml(t){
  const uc=urgencyClass(t.due,t.status);
  const dl=daysLabel(t.due,t.status);
  const mtg=t.minutesId?minutesList.find(m=>m.id===t.minutesId):null;
  return '<div class="task-card '+uc+'" onclick="openTask('+t.id+')">'+
    '<div class="task-top"><div class="task-title">'+t.title+'</div><span class="days-badge '+dl.cls+'">'+dl.txt+'</span></div>'+
    '<div class="task-meta">'+
    '<span class="meta-chip"><div class="avatar">'+initials(t.person)+'</div>'+t.person+'</span>'+
    '<span class="meta-chip"><i class="ti ti-calendar"></i>'+t.due+'</span>'+
    (mtg?'<span class="meeting-badge" onclick="event.stopPropagation();openMinutesDetail(\''+mtg.id+'\')"><i class="ti ti-notebook"></i>'+mtg.title+'</span>':'')+
    (t.fromMeeting&&!t.minutesId?'<span class="meeting-badge"><i class="ti ti-sparkles"></i>AI抽出</span>':'')+
    '</div></div>';
}

function renderTasks(){
  const visible=filterPerson==='全員'?tasks:tasks.filter(t=>t.person===filterPerson);
  const groups=[{key:'progress',label:'進行中'},{key:'todo',label:'未着手'},{key:'done',label:'完了'}];
  if(isWide()){
    document.getElementById('task-list-single').style.display='none';
    document.getElementById('task-list-left').style.display='';
    document.getElementById('task-list-right').style.display='';
    let lh='',rh='';
    [{key:'progress',label:'進行中'},{key:'todo',label:'未着手'}].forEach(g=>{
      const gt=visible.filter(t=>t.status===g.key);
      if(!gt.length)return;
      lh+='<div class="status-group"><div class="status-label"><span class="status-dot '+statusDot(g.key)+'"></span>'+g.label+'（'+gt.length+'件）</div>';
      gt.forEach(t=>{lh+=taskCardHtml(t)});lh+='</div>';
    });
    const done=visible.filter(t=>t.status==='done');
    if(done.length){rh+='<div class="status-group"><div class="status-label"><span class="status-dot dot-done"></span>完了（'+done.length+'件）</div>';done.forEach(t=>{rh+=taskCardHtml(t)});rh+='</div>';}
    if(!lh&&!rh)lh='<div class="empty"><i class="ti ti-mood-smile"></i>タスクはありません</div>';
    document.getElementById('task-list-left').innerHTML=lh;
    document.getElementById('task-list-right').innerHTML=rh;
  } else {
    document.getElementById('task-list-left').style.display='none';
    document.getElementById('task-list-right').style.display='none';
    document.getElementById('task-list-single').style.display='';
    let html='';let any=false;
    groups.forEach(g=>{
      const gt=visible.filter(t=>t.status===g.key);
      if(!gt.length)return;
      any=true;
      html+='<div class="status-group"><div class="status-label"><span class="status-dot '+statusDot(g.key)+'"></span>'+g.label+'（'+gt.length+'件）</div>';
      gt.forEach(t=>{html+=taskCardHtml(t)});html+='</div>';
    });
    document.getElementById('task-list-single').innerHTML=any?html:'<div class="empty"><i class="ti ti-mood-smile"></i>タスクはありません</div>';
  }
}

function renderMinutes(){
  const el=document.getElementById('minutes-list');
  if(!el)return;
  if(!minutesList.length){el.innerHTML='<div class="empty"><i class="ti ti-notebook"></i>議事録がありません</div>';return}
  const sorted=[...minutesList].sort((a,b)=>b.date.localeCompare(a.date));
  function mHtml(m){
    const linked=tasks.filter(t=>m.taskIds&&m.taskIds.includes(t.id));
    return '<div class="minutes-card" onclick="openMinutesDetail(\''+m.id+'\')">'+
      '<div class="minutes-card-top"><div class="minutes-title"><i class="ti ti-notebook" style="color:var(--main);margin-right:5px"></i>'+m.title+'</div>'+
      '<div style="font-size:12px;color:#aaa;white-space:nowrap">'+fmtDate(m.date)+'</div></div>'+
      '<div class="minutes-meta">'+(m.members?'<span class="meta-chip"><i class="ti ti-users"></i>'+m.members+'</span>':'')+
      (linked.length?'<span class="tag tag-tasks"><i class="ti ti-list-check" style="font-size:11px"></i> タスク'+linked.length+'件</span>':'<span class="tag tag-memo">メモのみ</span>')+
      '</div><div class="minutes-preview">'+m.body+'</div></div>';
  }
  const col1=sorted.filter((_,i)=>i%2===0);
  const col2=sorted.filter((_,i)=>i%2===1);
  if(isWide()){
    el.innerHTML='<div>'+col1.map(mHtml).join('')+'</div><div>'+col2.map(mHtml).join('')+'</div>';
  } else {
    el.innerHTML='<div style="grid-column:1/-1">'+sorted.map(mHtml).join('')+'</div>';
  }
}

function openMinutesDetail(id){
  const m=minutesList.find(x=>x.id===id);if(!m)return;
  const linked=tasks.filter(t=>m.taskIds&&m.taskIds.includes(t.id));
  let taskHtml='';
  if(linked.length){
    taskHtml='<div style="margin-bottom:12px"><div class="info-label" style="margin-bottom:6px">関連タスク（'+linked.length+'件）</div>';
    linked.forEach(t=>{const dl=daysLabel(t.due,t.status);taskHtml+='<div class="task-chip"><span class="status-dot '+statusDot(t.status)+'" style="width:7px;height:7px"></span>'+t.person+'：'+t.title+'<span class="days-badge '+dl.cls+'" style="font-size:10px;padding:2px 7px">'+dl.txt+'</span></div>';});
    taskHtml+='</div>';
  }
  document.getElementById('modal-area').innerHTML=
    '<div class="modal-bg" onclick="closeModal(event)"><div class="modal">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:8px">'+
    '<h3 style="margin-bottom:0;font-size:17px;color:var(--main-dark)">'+m.title+'</h3>'+
    '<button onclick="closeModal()" style="background:none;border:none;font-size:26px;color:#ccc;cursor:pointer;line-height:1">&times;</button></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+
    '<span class="meta-chip"><i class="ti ti-calendar"></i>'+fmtDate(m.date)+'</span>'+
    (m.members?'<span class="meta-chip"><i class="ti ti-users"></i>'+m.members+'</span>':'')+
    '</div>'+taskHtml+
    '<div class="info-label" style="margin-bottom:6px">議事録・メモ</div>'+
    '<div class="minutes-body">'+escHtml(m.body)+'</div>'+
    '<button class="big-btn btn-danger" onclick="deleteMinutes(\''+m.id+'\')"><i class="ti ti-trash"></i>この議事録を削除</button>'+
    '<button class="big-btn btn-gray" onclick="closeModal()"><i class="ti ti-x"></i>閉じる</button>'+
    '</div></div>';
}

function deleteMinutes(id){
  if(!confirm('この議事録を削除しますか？\n（関連タスクは残ります）'))return;
  minutesList=minutesList.filter(m=>m.id!==id);
  tasks=tasks.map(t=>t.minutesId===id?Object.assign({},t,{minutesId:null}):t);
  closeModal();renderAll();
}

function openTask(id){
  const t=tasks.find(x=>x.id===id);
  const dl=daysLabel(t.due,t.status);
  const ns=t.status==='todo'?'progress':t.status==='progress'?'done':'todo';
  const nl=ns==='progress'?'進行中にする':ns==='done'?'完了にする':'未着手に戻す';
  const ni=ns==='progress'?'ti-player-play':ns==='done'?'ti-check':'ti-rotate-clockwise';
  const mtg=t.minutesId?minutesList.find(m=>m.id===t.minutesId):null;
  document.getElementById('modal-area').innerHTML=
    '<div class="modal-bg" onclick="closeModal(event)"><div class="modal">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:8px">'+
    '<h3 style="margin-bottom:0;color:#333">'+t.title+'</h3>'+
    '<button onclick="closeModal()" style="background:none;border:none;font-size:26px;color:#ccc;cursor:pointer;line-height:1">&times;</button></div>'+
    '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">'+
    '<div class="info-card"><div class="info-label">担当者</div><div class="info-val" style="display:flex;align-items:center;gap:6px"><span class="avatar">'+initials(t.person)+'</span>'+t.person+'</div></div>'+
    '<div class="info-card"><div class="info-label">期限</div><div class="info-val" style="display:flex;align-items:center;gap:8px">'+t.due+'<span class="days-badge '+dl.cls+'">'+dl.txt+'</span></div></div>'+
    '<div class="info-card"><div class="info-label">ステータス</div><div class="info-val" style="display:flex;align-items:center;gap:5px"><span class="status-dot '+statusDot(t.status)+'"></span>'+statusLabel(t.status)+'</div></div>'+
    (mtg?'<div class="info-card" style="cursor:pointer" onclick="closeModal();openMinutesDetail(\''+mtg.id+'\')"><div class="info-label">出典議事録</div><div class="info-val" style="color:var(--main-dark)"><i class="ti ti-notebook"></i> '+mtg.title+'（'+fmtDate(mtg.date)+'）</div></div>':'')+
    '</div>'+
    '<button class="big-btn btn-primary" onclick="changeStatus('+id+',\''+ns+'\')"><i class="ti '+ni+'"></i>'+nl+'</button>'+
    '<button class="big-btn btn-danger" onclick="deleteTask('+id+')"><i class="ti ti-trash"></i>このタスクを削除</button>'+
    '<button class="big-btn btn-gray" onclick="closeModal()"><i class="ti ti-x"></i>閉じる</button>'+
    '</div></div>';
}
function closeModal(e){if(!e||e.target.classList.contains('modal-bg')){document.getElementById('modal-area').innerHTML=''}}
function changeStatus(id,s){tasks=tasks.map(t=>t.id===id?Object.assign({},t,{status:s}):t);closeModal();renderAll()}
function deleteTask(id){if(confirm('削除しますか？')){tasks=tasks.filter(t=>t.id!==id);closeModal();renderAll()}}

function switchTab(tab){
  ['tasks','ai','minutes','add'].forEach(t=>{const el=document.getElementById('tab-'+t);if(el)el.style.display=t===tab?'block':'none'});
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['tasks','ai','minutes','add'][i]===tab));
  if(tab==='minutes')renderMinutes();
}

function addManualTask(){
  const title=document.getElementById('f-title').value.trim();
  const person=document.getElementById('f-person').value;
  const due=document.getElementById('f-due').value;
  const status=document.getElementById('f-status').value;
  if(!title||!due){alert('タスク内容と期限を入力してください');return}
  tasks.push({id:nextId++,title,person,due,status,fromMeeting:false,minutesId:null});
  document.getElementById('f-title').value='';
  switchTab('tasks');renderAll();
}


function addDays(baseDate, days){
  const d=new Date(baseDate+'T00:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().split('T')[0];
}
function nextWeekday(baseDate, weekday){
  const d=new Date(baseDate+'T00:00:00');
  let diff=(weekday-d.getDay()+7)%7;
  if(diff===0)diff=7;
  d.setDate(d.getDate()+diff);
  return d.toISOString().split('T')[0];
}
function normalizePerson(line,members){
  const names=[...PEOPLE.filter(p=>p!=='全員'),...String(members||'').split(/[、,，\s]+/).filter(Boolean),'その他'];
  for(const n of names){if(n&&line.includes(n))return n;}
  const m=line.match(/^\s*[・\-－*]?\s*([^：:]{1,6})[：:]/);
  return m&&m[1] ? m[1].trim() : 'その他';
}
function detectDue(line,meetingDate){
  const base=meetingDate||today();
  const ym=line.match(/(20\d{2})[\/\-年](\d{1,2})[\/\-月](\d{1,2})日?/);
  if(ym)return ym[1]+'-'+String(ym[2]).padStart(2,'0')+'-'+String(ym[3]).padStart(2,'0');
  const md=line.match(/(\d{1,2})月(\d{1,2})日/);
  if(md){const y=new Date(base+'T00:00:00').getFullYear();return y+'-'+String(md[1]).padStart(2,'0')+'-'+String(md[2]).padStart(2,'0');}
  const days=line.match(/(\d+)日以内/);
  if(days)return addDays(base,parseInt(days[1],10));
  if(/今日中|本日中|本日まで|今日まで/.test(line))return base;
  if(/明日中|明日まで/.test(line))return addDays(base,1);
  if(/明後日/.test(line))return addDays(base,2);
  if(/今週中|週内/.test(line))return nextWeekday(base,5);
  if(/来週中/.test(line))return addDays(nextWeekday(base,5),7);
  const wdMap={'日':0,'月':1,'火':2,'水':3,'木':4,'金':5,'土':6};
  const wd=line.match(/来週([日月火水木金土])曜日?/);
  if(wd)return addDays(nextWeekday(base,wdMap[wd[1]]),7);
  const thisWd=line.match(/([日月火水木金土])曜日?まで/);
  if(thisWd)return nextWeekday(base,wdMap[thisWd[1]]);
  if(/月末|今月末/.test(line)){const d=new Date(base+'T00:00:00');return new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().split('T')[0];}
  return addDays(base,7);
}
function cleanTaskTitle(line,person){
  let s=line.replace(/^\s*[・\-－*]\s*/,'').trim();
  s=s.replace(new RegExp('^'+person+'[：:]'),'').trim();
  s=s.replace(/(が|は|より)?\s*(今日中|本日中|明日中|明後日|今週中|来週中|週内|月末|今月末|\d+日以内|\d{1,2}月\d{1,2}日まで|来週[日月火水木金土]曜日?まで|[日月火水木金土]曜日?まで|20\d{2}[\/\-年]\d{1,2}[\/\-月]\d{1,2}日?まで?)\s*(に|までに|まで)?/g,'');
  s=s.replace(/すること|お願いします|してください|完了する|対応する/g,'').trim();
  s=s.replace(/^[：:、,。\s]+|[。\s]+$/g,'');
  return s || line.trim();
}
function extractTasksLocal(body,meetingDate,members){
  const taskWords=/(まで|期限|担当|宿題|TODO|ToDo|タスク|対応|確認|提出|作成|送付|連絡|共有|準備|手配|発注|回収|修正|入力|報告|調整|確認する|提出する|作成する|送付する|連絡する)/i;
  const lines=body.split(/\n+/).map(x=>x.trim()).filter(Boolean);
  const out=[];
  lines.forEach(line=>{
    if(!taskWords.test(line))return;
    const person=normalizePerson(line,members);
    const due=detectDue(line,meetingDate);
    const title=cleanTaskTitle(line,person);
    if(title.length<3)return;
    if(out.some(t=>t.title===title&&t.person===person))return;
    out.push({title,person,due,status:'todo'});
  });
  return out;
}
function makeAiMinutes(title,date,members,body,extracted){
  const lines=body.split(/\n+/).map(x=>x.replace(/^\s*[・\-－*]\s*/,'').trim()).filter(Boolean);
  const decisions=lines.filter(l=>/(決定|承認|実施|採用|確定|合意)/.test(l));
  const issues=lines.filter(l=>/(課題|問題|未定|不足|遅れ|懸念|確認必要|要確認)/.test(l));
  let txt='【会議名】\n'+title+'\n\n';
  txt+='【会議日】\n'+fmtDate(date||today())+'\n\n';
  if(members)txt+='【参加者】\n'+members+'\n\n';
  txt+='【議事要約】\n';
  if(lines.length){lines.slice(0,8).forEach(l=>{txt+='・'+l+'\n';});}else{txt+='・入力メモから要約項目を作成できませんでした\n';}
  txt+='\n【決定事項】\n';
  if(decisions.length){decisions.forEach(l=>{txt+='・'+l+'\n';});}else{txt+='・明確な決定事項はメモ内では確認できません\n';}
  txt+='\n【課題・確認事項】\n';
  if(issues.length){issues.forEach(l=>{txt+='・'+l+'\n';});}else{txt+='・明確な課題はメモ内では確認できません\n';}
  txt+='\n【抽出タスク】\n';
  if(extracted.length){extracted.forEach(t=>{txt+='・'+t.person+'：'+t.title+'（期限：'+t.due+'）\n';});}else{txt+='・タスク候補は見つかりませんでした\n';}
  txt+='\n【元メモ】\n'+body;
  return txt;
}

function getMinutesFormValues(){
  return{title:document.getElementById('meeting-title').value.trim(),date:document.getElementById('meeting-date').value,members:document.getElementById('meeting-members').value.trim(),body:document.getElementById('minutes-input').value.trim()};
}
function saveMinutesOnly(){
  const{title,date,members,body}=getMinutesFormValues();
  if(!title||!body){alert('タイトルとメモ本文を入力してください');return}
  const mid='m'+nextMinutesId++;
  minutesList.push({id:mid,title,date:date||today(),members,body,taskIds:[],savedAt:new Date().toISOString()});
  clearAIForm();alert('議事録を保存しました');switchTab('minutes');renderAll();
}
async function saveAndExtract(){
  const{title,date,members,body}=getMinutesFormValues();
  if(!title||!body){alert('タイトルとメモ本文を入力してください');return}
  const res=document.getElementById('extracted-results');
  res.innerHTML='<div style="text-align:center;padding:24px;color:#aaa"><span class="spinner"></span><br><br>議事録を整形してタスクを抽出中...</div>';
  await new Promise(r=>setTimeout(r,250));
  const extracted=extractTasksLocal(body,date||today(),members);
  const aiBody=makeAiMinutes(title,date||today(),members,body,extracted);
  const mid='m'+nextMinutesId++;
  minutesList.push({id:mid,title,date:date||today(),members,body:aiBody,taskIds:[],savedAt:new Date().toISOString()});
  if(!extracted.length){
    res.innerHTML='<div class="card-box"><h3><i class="ti ti-notebook"></i> 議事録を保存しました</h3><p style="color:#888;font-size:14px;line-height:1.7">タスク候補は見つかりませんでした。<br>「担当者」「期限」「提出・確認・連絡・作成」などを含めると抽出しやすくなります。</p></div>';
    renderAll();
    return;
  }
  const safeJson=encodeURIComponent(JSON.stringify(extracted));
  let html='<div class="card-box"><h3 style="color:var(--main-dark)"><i class="ti ti-check"></i>'+extracted.length+'件のタスクを抽出しました</h3>';
  extracted.forEach(t=>{const dl=daysLabel(t.due,'todo');html+='<div class="info-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div class="info-val" style="font-size:14px;flex:1">'+escHtml(t.title)+'</div><span class="days-badge '+dl.cls+'">'+dl.txt+'</span></div><div style="display:flex;gap:10px;margin-top:7px"><span class="meta-chip"><div class="avatar">'+initials(t.person||'？')+'</div>'+escHtml(t.person||'その他')+'</span><span class="meta-chip"><i class="ti ti-calendar"></i>'+t.due+'</span></div></div>';});
  html+='<button class="big-btn btn-primary" style="margin-top:4px" onclick="registerExtracted(\''+safeJson+'\',\''+mid+'\')"><i class="ti ti-plus"></i>タスクに登録する</button>';
  html+='<button class="big-btn btn-secondary" onclick="switchTab(\'minutes\')"><i class="ti ti-notebook"></i>保存した議事録を見る</button></div>';
  res.innerHTML=html;
  renderAll();
}
function registerExtractedfunction registerExtracted(jsonStr,minutesId){
  const arr=JSON.parse(decodeURIComponent(jsonStr));
  const newIds=[];
  arr.forEach(t=>{const nid=nextId++;tasks.push({id:nid,title:t.title,person:t.person||'その他',due:t.due,status:'todo',fromMeeting:true,minutesId:minutesId||null});newIds.push(nid);});
  if(minutesId){minutesList=minutesList.map(m=>m.id===minutesId?Object.assign({},m,{taskIds:(m.taskIds||[]).concat(newIds)}):m)}
  clearAIForm();document.getElementById('extracted-results').innerHTML='';switchTab('tasks');renderAll();
}
function clearAIForm(){
  document.getElementById('meeting-title').value='';document.getElementById('meeting-date').value=today();
  document.getElementById('meeting-members').value='';document.getElementById('minutes-input').value='';
}

window.addEventListener('resize',()=>{renderTasks();renderMinutes()});
document.getElementById('f-due').value=new Date(Date.now()+7*86400000).toISOString().split('T')[0];
document.getElementById('meeting-date').value=today();
renderAll();
</script>
