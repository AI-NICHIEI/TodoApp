<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会議タスク管理 - 産廃・砕石</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --main:#7DBF3A;--main-dark:#5A9A1F;--main-light:#E8F7D0;--main-mid:#A8D96A;
  --sky:#5BB8E8;--sky-light:#D6F0FF;--sky-mid:#89CFEE;
  --red:#E05B5B;--red-light:#FFE8E8;
  --amber:#D4830A;--amber-light:#FFF2D6;
  --gray:#7A7A6E;--gray-light:#F0EFE6;
  --border:#D8EDB8;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#E8F7D0,#F2FAE6,#EEFADB);min-height:100vh}
#app{max-width:100%;background:rgba(242,250,230,0.9);min-height:100vh;position:relative}
.header{background:linear-gradient(120deg,var(--main) 0%,#9DD44A 100%);padding:16px 20px 14px;box-shadow:0 2px 12px rgba(125,191,58,.25)}
.header h1{font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;text-shadow:0 1px 3px rgba(0,0,0,.15)}
.header p{font-size:12px;color:rgba(255,255,255,.85);margin-top:3px}
.tab-bar{display:flex;background:#fff;border-bottom:2px solid var(--border);overflow-x:auto}
.tab{flex:1;min-width:54px;padding:9px 3px;font-size:10px;font-weight:700;text-align:center;cursor:pointer;color:#aaa;border:none;background:transparent;border-bottom:3px solid transparent;margin-bottom:-2px;display:flex;flex-direction:column;align-items:center;gap:1px;white-space:nowrap}
.tab i{font-size:16px}
.tab.active{color:var(--main-dark);border-bottom-color:var(--main)}
.section{padding:14px}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-chip{padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:#fff;color:#666;transition:all .15s}
.filter-chip.active{background:var(--main);color:#fff;border-color:var(--main)}
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sum-card{background:#fff;border-radius:14px;border:2px solid var(--border);padding:12px;text-align:center;box-shadow:0 2px 8px rgba(125,191,58,.1)}
.sum-num{font-size:28px;font-weight:700}
.sum-lbl{font-size:11px;color:#888;margin-top:2px;font-weight:600}
.status-group{margin-bottom:16px}
.status-label{font-size:12px;font-weight:700;color:#888;margin-bottom:7px;padding-left:2px;display:flex;align-items:center;gap:5px}
.status-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-todo{background:#C8C8B8}.dot-progress{background:var(--sky)}.dot-done{background:var(--main-mid)}
.task-card{background:#fff;border-radius:14px;border:2px solid var(--border);padding:13px 14px;margin-bottom:9px;cursor:pointer;transition:transform .1s;box-shadow:0 2px 8px rgba(125,191,58,.07)}
.task-card:active{transform:scale(.98)}
.task-card.urgent{border-left:5px solid #E05B5B;background:var(--red-light);border-color:#FFBBBB}
.task-card.warning{border-left:5px solid #F0B030;background:var(--amber-light);border-color:#FFD98A}
.task-card.in-progress-card{background:var(--sky-light);border-color:var(--sky-mid)}
.task-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.task-title{font-size:15px;font-weight:600;color:#333;line-height:1.45;flex:1}
.days-badge{font-size:12px;font-weight:700;border-radius:20px;padding:4px 10px;white-space:nowrap;flex-shrink:0}
.days-badge.red{background:#FFCECE;color:#C02020}
.days-badge.amber{background:#FFE0A0;color:#8B5500}
.days-badge.green{background:var(--main-light);color:var(--main-dark)}
.days-badge.gray{background:#E8E8DC;color:#666}
.task-meta{display:flex;gap:8px;margin-top:9px;align-items:center;flex-wrap:wrap}
.meta-chip{font-size:12px;color:#888;display:flex;align-items:center;gap:4px}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--main-light);color:var(--main-dark);font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid var(--main-mid)}
.meeting-badge{font-size:11px;color:var(--main-dark);display:flex;align-items:center;gap:3px;font-weight:600;background:var(--main-light);border-radius:10px;padding:2px 7px}
.big-btn{width:100%;padding:15px;border-radius:14px;font-size:15px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:10px;transition:opacity .15s,transform .1s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.big-btn:active{opacity:.85;transform:scale(.98)}
.btn-primary{background:linear-gradient(120deg,var(--main),#9DD44A);color:#fff}
.btn-sky{background:var(--sky-light);color:#1A6E9A;border:2px solid var(--sky-mid)}
.btn-danger{background:var(--red-light);color:#C02020;border:2px solid #FFBBBB}
.btn-gray{background:var(--gray-light);color:#666;border:2px solid #DDD}
.btn-yellow{background:#FAFAB0;color:#6B6B10;border:2px solid #E0E066}
.card-box{background:#fff;border-radius:14px;border:2px solid var(--border);padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(125,191,58,.08)}
.card-box h3{font-size:15px;font-weight:700;color:var(--main-dark);margin-bottom:10px;display:flex;align-items:center;gap:7px}
textarea{width:100%;padding:11px;font-size:14px;border-radius:10px;border:2px solid var(--border);background:#FAFEF4;color:#333;resize:vertical;min-height:110px;font-family:inherit;line-height:1.6}
textarea:focus{outline:none;border-color:var(--main)}
.info-card{background:#FAFEF4;border-radius:10px;border:2px solid var(--border);padding:11px;margin-bottom:8px}
.info-label{font-size:11px;color:#999;margin-bottom:2px;font-weight:700}
.info-val{font-size:14px;font-weight:600;color:#333}
.form-row{margin-bottom:11px}
.form-row label{font-size:13px;color:#666;display:block;margin-bottom:5px;font-weight:700}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:12px;border-radius:10px;border:2px solid var(--border);background:#FAFEF4;color:#333;font-size:15px;font-family:inherit}
.form-row textarea{min-height:90px;resize:vertical}
.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid var(--main-light);border-top-color:var(--main);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:36px 16px;color:#aaa;font-size:14px}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(60,100,30,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;overflow-y:auto;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:18px;padding:20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;border:2px solid var(--border);box-shadow:0 8px 32px rgba(80,160,40,.15)}
.minutes-card{background:#fff;border-radius:14px;border:2px solid var(--border);padding:14px;margin-bottom:10px;cursor:pointer;transition:transform .1s;box-shadow:0 2px 8px rgba(125,191,58,.07)}
.minutes-card:active{transform:scale(.98)}
.minutes-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.minutes-title{font-size:15px;font-weight:700;color:#333;flex:1;line-height:1.4}
.minutes-meta{display:flex;gap:8px;margin-top:7px;flex-wrap:wrap;align-items:center}
.minutes-preview{font-size:12px;color:#999;margin-top:7px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tag{font-size:11px;font-weight:700;border-radius:20px;padding:3px 9px}
.tag-tasks{background:var(--main-light);color:var(--main-dark)}
.tag-memo{background:var(--gray-light);color:#888}
.minutes-body{font-size:14px;color:#444;line-height:1.8;white-space:pre-wrap;background:#FAFEF4;border-radius:10px;padding:12px;margin-bottom:12px;max-height:300px;overflow-y:auto;border:2px solid var(--border)}
.task-chip{display:inline-flex;align-items:center;gap:5px;background:var(--main-light);color:var(--main-dark);font-size:12px;font-weight:600;border-radius:8px;padding:5px 9px;margin:3px 3px 3px 0;border:1px solid var(--main-mid)}
.minutes-new-btn{background:linear-gradient(120deg,var(--main),#9DD44A);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer}
.step-box{background:var(--sky-light);border:2px solid var(--sky-mid);border-radius:14px;padding:16px;margin-bottom:12px}
.step-box h4{color:#1A6E9A;font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.extracted-task-row{background:#fff;border-radius:10px;border:2px solid var(--sky-mid);padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.extracted-task-row .task-text{flex:1;min-width:120px;font-size:14px;font-weight:600;color:#333}
.extracted-task-row select,.extracted-task-row input[type=date]{padding:6px 8px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;background:#FAFEF4;color:#333}
.notice-box{background:#FAFEF4;border:2px solid var(--main-mid);border-radius:12px;padding:14px;margin-bottom:12px;font-size:13px;color:#5A9A1F;line-height:1.7}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mode-card{background:#fff;border:2px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;text-align:center;transition:all .15s}
.mode-card.selected{border-color:var(--main);background:var(--main-light)}
.mode-card i{font-size:24px;display:block;margin-bottom:4px}
.mode-card .mode-title{font-size:13px;font-weight:700;color:#333;margin-bottom:2px}
.mode-card .mode-desc{font-size:11px;color:#777;line-height:1.3}
.mode-card.selected .mode-title{color:var(--main-dark)}
.prompt-box{background:#FFF2D6;border:2px dashed #D4830A;border-radius:12px;padding:12px;margin-bottom:12px}
.prompt-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prompt-title{font-size:12px;font-weight:700;color:#D4830A;display:flex;align-items:center;gap:4px}
.copy-btn{background:#fff;border:1.5px solid #D4830A;color:#D4830A;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.prompt-text{font-size:12px;color:#555;white-space:pre-wrap;background:rgba(255,255,255,0.7);padding:8px;border-radius:6px;max-height:100px;overflow-y:auto;line-height:1.4}
.member-list{display:flex;flex-direction:column;gap:8px}
.member-row{background:#fff;border-radius:12px;border:2px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px}
.member-avatar-lg{width:40px;height:40px;border-radius:50%;background:var(--main-light);color:var(--main-dark);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid var(--main-mid)}
.member-name{font-size:16px;font-weight:700;color:#333;flex:1}
.member-task-count{font-size:12px;color:#888;background:var(--gray-light);border-radius:20px;padding:3px 10px;white-space:nowrap}
.member-actions{display:flex;gap:6px}
.icon-btn{width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px}
.icon-btn.edit{background:var(--sky-light);color:#1A6E9A}
.icon-btn.del{background:var(--red-light);color:#C02020}
.add-member-box{background:#fff;border-radius:14px;border:2px dashed var(--main-mid);padding:16px;margin-top:4px}
.add-member-box h4{font-size:14px;font-weight:700;color:var(--main-dark);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.inline-input-row{display:flex;gap:8px;align-items:center}
.inline-input-row input{flex:1;padding:11px 14px;border-radius:10px;border:2px solid var(--border);background:#FAFEF4;color:#333;font-size:15px}
.inline-input-row button{padding:11px 16px;border-radius:10px;border:none;background:linear-gradient(120deg,var(--main),#9DD44A);color:#fff;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
@media(min-width:768px){
  #app{max-width:900px;margin:0 auto;box-shadow:0 0 50px rgba(125,191,58,.15)}
  .header{padding:22px 32px 18px}
  .header h1{font-size:22px}
  .tab{font-size:12px;padding:12px 6px}
  .section{padding:20px 28px}
  .filter-chip{font-size:14px;padding:9px 16px}
  .task-card{padding:16px 18px}
  .task-title{font-size:16px}
  .big-btn{font-size:16px;padding:17px}
  .card-box{padding:20px}
  .form-row input,.form-row select,.form-row textarea{font-size:16px;padding:14px}
  .sum-num{font-size:32px}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
  .modal{max-width:520px}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-text">
      <h1><i class="ti ti-leaf"></i> 会議タスク管理</h1>
      <p>産業廃棄物処理・砕石販売 現場管理システム（全員共有・同期モード）</p>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('tasks')"><i class="ti ti-list-check"></i>タスク</button>
    <button class="tab" onclick="switchTab('ai')"><i class="ti ti-sparkles"></i>AI議事録</button>
    <button class="tab" onclick="switchTab('minutes')"><i class="ti ti-notebook"></i>議事録</button>
    <button class="tab" onclick="switchTab('members')"><i class="ti ti-users"></i>担当者</button>
    <button class="tab" onclick="switchTab('add')"><i class="ti ti-plus"></i>追加</button>
  </div>

  <div id="tab-tasks" class="section">
    <div class="summary-row" id="summary"></div>
    <div class="filter-row" id="filter-row"></div>
    <div class="two-col">
      <div id="task-list-left"></div>
      <div id="task-list-right"></div>
    </div>
    <div id="task-list-single"></div>
  </div>

  <div id="tab-ai" class="section" style="display:none">
    <div class="notice-box">
      <b><i class="ti ti-info-circle"></i> 音声文字起こし活用ステップ</b><br>
      ① 会議のまとめ方を選択 ➔ ② AI指示文をコピーしてChatGPT等へ投げる ➔ ③ 出力を下に貼り付けてタスク抽出
    </div>
    <div class="two-col">
      <div class="card-box">
        <h3><i class="ti ti-settings"></i> 1. まとめ方の選択 & 指示文取得</h3>
        <div class="form-row"><label>会議タイトル</label><input id="meeting-title" type="text" placeholder="例：5月定例会議"></div>
        <div class="form-row"><label>会議日</label><input id="meeting-date" type="date"></div>
        <div class="form-row"><label>参加者</label><input id="meeting-members" type="text" placeholder="例：園美、吉岡"></div>
        <div class="mode-cards">
          <div class="mode-card selected" id="mode-brief" onclick="selectMode('brief')"><div class="mode-title">📋 箇条書き要点</div></div>
          <div class="mode-card" id="mode-detail" onclick="selectMode('detail')"><div class="mode-title">📝 詳細プロセス</div></div>
        </div>
        <div class="prompt-box">
          <div class="prompt-header"><div class="prompt-title">AIへの専用指示文</div><button class="copy-btn" onclick="copyPrompt()">コピー</button></div>
          <div class="prompt-text" id="prompt-display"></div>
        </div>
        <h3><i class="ti ti-clipboard-text"></i> 2. 議事録の貼り付け</h3>
        <div class="form-row"><textarea id="minutes-input" rows="6" placeholder="ChatGPTの出力を貼り付け"></textarea></div>
        <button class="big-btn btn-primary" onclick="analyzeMinutes()"><i class="ti ti-sparkles"></i> タスクを抽出</button>
      </div>
      <div id="ai-result-area"></div>
    </div>
  </div>

  <div id="tab-minutes" class="section" style="display:none"><div class="two-col" id="minutes-list"></div></div>
  <div id="tab-members" class="section" style="display:none"><div class="member-list" id="member-list"></div></div>
  <div id="tab-add" class="section" style="display:none">
    <div class="card-box">
      <div class="form-row"><label>タスク内容</label><input id="f-title" type="text"></div>
      <div class="form-row"><label>担当者</label><select id="f-person"></select></div>
      <div class="form-row"><label>期限</label><input id="f-due" type="date"></div>
      <button class="big-btn btn-primary" onclick="addManualTask()">追加</button>
    </div>
  </div>
  <div id="modal-area"></div>
</div>

<script>
// ==========================================
// 💡 URLも正しいマスターパスワードも、私が全て設定しました！
// ==========================================
const SUPABASE_URL = "https://uzjftccxoipspazrtuvl.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6amZ0Y2N4b2lwc3BhenJ0dXZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg0ODIxNjAsImV4cCI6MjA2NDA0MjE2MH0.LidUv4Ea1nizjWfR0H0E2yqK_hZorv7zB7yq-62I7lE";
// ==========================================

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let members=['園美','奈美','真美','恵一','美佳','矢板','月井','北浦','美咲','明日香','関根','吉岡'];
let filterPerson='全員';let currentMode='brief';let tasks=[];let minutesList=[];let pendingTasks=[];

async function loadDataFromDatabase() {
  try {
    const { data: dbTasks } = await supabase.from('task_list').select('*').order('id', { ascending: true });
    tasks = dbTasks || [];
    const { data: dbMinutes } = await supabase.from('minutes_list').select('*');
    minutesList = dbMinutes || [];
    renderAll();
  } catch (e) { console.error(e); }
}
function today(){return new Date().toISOString().split('T')[0]}
function daysLeft(due){return Math.ceil((new Date(due)-new Date(today()))/(1000*60*60*24))}
function urgencyClass(due,status){if(status==='done')return '';const d=daysLeft(due);return d<=2?'urgent':d<=5?'warning':''}
function daysLabel(due,status){
  if(status==='done')return {cls:'gray',txt:'完了'};
  const d=daysLeft(due);
  if(d<0)return {cls:'red',txt:Math.abs(d)+'日超過'};
  return {cls:'green',txt:'残'+d+'日'};
}
function statusDot(s){return s==='todo'?'dot-todo':s==='progress'?'dot-progress':'dot-done'}
function statusLabel(s){return s==='todo'?'未着手':s==='progress'?'進行中':'完了'}
function initials(name){return (name||'？').slice(0,2)}
function fmtDate(d){if(!d)return '';const[y,m,dd]=d.split('-');return y+'年'+parseInt(m)+'月'+parseInt(dd)+'日'}
function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function updatePromptText(){
  const title = document.getElementById('meeting-title').value.trim() || '無題の会議';
  document.getElementById('prompt-display').innerText = `会議名：${title}\n上記の会議に関して、決定事項、タスク、担当者、期限を箇条書きで抽出してください。`;
}
function selectMode(mode){ currentMode = mode; updatePromptText(); }
function copyPrompt(){ navigator.clipboard.writeText(document.getElementById('prompt-display').innerText); alert('コピーしました'); }
function buildPersonSelect(selId, currentVal){
  const sel=document.getElementById(selId); if(!sel)return;
  sel.innerHTML=members.map(m=>'<option value="'+m+'"'+(m===currentVal?' selected':'')+'>'+m+'</option>').join('');
}
function renderAll(){renderSummary();renderFilters();renderTasks();buildPersonSelect('f-person','');updatePromptText()}
function renderSummary(){
  document.getElementById('summary').innerHTML=`<div class="sum-card"><div class="sum-num">${tasks.filter(t=>t.status==='todo').length}</div><div>未着手</div></div><div class="sum-card"><div class="sum-num">${tasks.filter(t=>t.status==='progress').length}</div><div>進行中</div></div>`;
}
function renderFilters(){
  document.getElementById('filter-row').innerHTML=['全員',...members].map(p=>`<button class="filter-chip ${filterPerson===p?'active':''}" onclick="setFilter('${p}')">${p}</button>`).join('');
}
function setFilter(p){filterPerson=p;renderAll()}
function taskCardHtml(t){
  return `<div class="task-card ${urgencyClass(t.due,t.status)}" onclick="openTask(${t.id})"><div class="task-top"><div class="task-title">${escHtml(t.title)}</div></div></div>`;
}
function renderTasks(){
  const visible=filterPerson==='全員'?tasks:tasks.filter(t=>t.person===filterPerson);
  document.getElementById('task-list-single').innerHTML=visible.map(taskCardHtml).join('');
}
function switchTab(tab){
  ['tasks','ai','minutes','members','add'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===tab?'block':'none'});
}
async function addManualTask(){
  const title=document.getElementById('f-title').value.trim();
  const person=document.getElementById('f-person').value;
  const due=document.getElementById('f-due').value;
