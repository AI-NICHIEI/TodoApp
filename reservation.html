<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>搬入予約システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#F0F9F4;min-height:100vh}
#app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh}
.hdr{background:linear-gradient(135deg,#2A7A4B,#3DAA6A);padding:16px 18px;color:#fff}
.hdr h1{font-size:17px;font-weight:700}
.hdr p{font-size:11px;opacity:.85;margin-top:3px}
.adm{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:#FFF8E6;border-bottom:2px solid #FFE4A0;font-size:12px;color:#8B5500;font-weight:600}
.sw{width:44px;height:24px;position:relative;display:inline-block;cursor:pointer}
.sw input{opacity:0;position:absolute}
.sw-t{position:absolute;inset:0;background:#ccc;border-radius:24px;transition:.3s}
.sw-t:before{content:"";position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.sw input:checked+.sw-t{background:#2A7A4B}
.sw input:checked+.sw-t:before{transform:translateX(20px)}
.wknav{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:#E8F5EE;border-bottom:2px solid #C8E6D4}
.wkbtn{background:#2A7A4B;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer}
.wkbtn:disabled{background:#ccc}
.dtabs{display:flex;background:#fff;border-bottom:2px solid #C8E6D4}
.dtab{flex:1;padding:8px 3px;text-align:center;cursor:pointer;border:none;background:transparent;border-bottom:3px solid transparent;margin-bottom:-2px}
.dtab.on{border-bottom-color:#2A7A4B;background:#E8F5EE}
.dn{font-size:10px;font-weight:700;color:#999}
.dtab.on .dn{color:#2A7A4B}
.dnum{font-size:19px;font-weight:700;color:#333;margin:2px 0}
.dtab.on .dnum{color:#2A7A4B}
.dcnt{font-size:10px;font-weight:700;color:#fff;background:#27AE60;border-radius:10px;padding:1px 6px;display:inline-block}
.dcnt.z{background:#ddd;color:#999}
.swrap{padding:13px 14px}
.stitle{font-size:12px;font-weight:700;margin:12px 0 8px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.sbtn{padding:11px 5px;border-radius:11px;border:2px solid #27AE60;background:#fff;cursor:pointer;text-align:center}
.sbtn:active{transform:scale(.95)}
.stime{font-size:12px;font-weight:700;color:#27AE60;display:block}
.scirc{font-size:26px;color:#27AE60;display:block;line-height:1;margin:2px 0}
.s15{border-color:#E67E22}
.s15 .stime{color:#E67E22}
.s15 .scirc{color:#E67E22}
.smin{font-size:9px;font-weight:700;color:#E67E22}
.empty{text-align:center;padding:48px 16px;color:#aaa}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.52);display:flex;align-items:center;justify-content:center;z-index:100;padding:18px}
.mbox{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:340px}
.mttl{font-size:16px;font-weight:700;color:#2A7A4B;margin-bottom:7px}
.mtb{font-size:13px;font-weight:600;color:#444;background:#E8F5EE;padding:9px 12px;border-radius:8px;margin-bottom:14px;line-height:1.65}
.mbox label{font-size:12px;font-weight:700;color:#555;display:block;margin-bottom:4px}
.mbox input{width:100%;padding:12px;border-radius:9px;border:2px solid #C8E6D4;font-size:14px;font-family:inherit;background:#FAFEF4;color:#333;margin-bottom:14px}
.mbox input:focus{outline:none;border-color:#2A7A4B}
.mbtns{display:flex;gap:8px}
.mbtns button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer}
.mok{background:linear-gradient(120deg,#2A7A4B,#3DAA6A);color:#fff}
.mng{background:#EFEFEF;color:#666}
.dbox{background:#E8F5EE;border-radius:10px;padding:13px;margin-bottom:12px;border:1.5px solid #C8E6D4}
.dco{font-size:16px;font-weight:700;color:#2A7A4B}
.dsub{font-size:11px;color:#666;margin-top:4px}
.bdel{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:#FFE8E8;color:#E05B5B;border:2px solid #FFBBBB;margin-bottom:8px}
.bcls{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;background:#EFEFEF;color:#666}
</style>
</head>
<body>
<div id="app">
  <div class="hdr"><h1>🚛 搬入予約システム</h1><p>産業廃棄物処理施設 ｜ 受け入れ予約</p></div>
  <div class="adm">
    <span>🛡 管理者モード（予約削除可）</span>
    <label class="sw"><input type="checkbox" id="admsw" onchange="isAdm=this.checked"><span class="sw-t"></span></label>
  </div>
  <div class="wknav">
    <button class="wkbtn" id="pb" onclick="chW(-1)" disabled>◀ 前週</button>
    <div style="font-size:13px;font-weight:700;color:#2A7A4B" id="wlbl"></div>
    <button class="wkbtn" id="nb" onclick="chW(1)">次週 ▶</button>
  </div>
  <div class="dtabs" id="dtabs"></div>
  <div class="swrap" id="swrap"></div>
  <div id="modal"></div>
</div>
<script>
var R={},isAdm=false,wk=1,sd=0;
var DN=['月','火','水','木','金','土'];
var S30=['08:30','09:00','09:30','10:00','10:30','11:00','11:30','13:00','13:30','14:00','14:30','15:00','15:30'];
var S15=['10:15','10:45','11:15','11:45','13:15','13:45','14:15','14:45','15:15'];
function gw(o){
  var t=new Date();t.setHours(0,0,0,0);
  var dw=t.getDay(),df=dw===0?-6:1-dw,mn=new Date(t);
  mn.setDate(t.getDate()+df+o*7);
  return Array.from({length:6},function(_,i){var d=new Date(mn);d.setDate(mn.getDate()+i);return d;});
}
function fmt(d){return d.toISOString().split('T')[0];}
function fj(d){return(d.getMonth()+1)+'月'+d.getDate()+'日';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ca(ds){return S30.concat(S15).filter(function(s){return!R[ds+'_'+s];}).length;}
function chW(d){wk+=d;sd=0;upd();}
function upd(){
  var days=gw(wk);
  document.getElementById('wlbl').textContent=fj(days[0])+'〜'+fj(days[5]);
  document.getElementById('pb').disabled=wk<=1;
  document.getElementById('nb').disabled=wk>=4;
  rTabs();rSlots();
}
function rTabs(){
  var days=gw(wk),h='';
  days.forEach(function(d,i){
    var ds=fmt(d),av=ca(ds);
    h+='<button class="dtab'+(i===sd?' on':'')+'" onclick="selD('+i+')">'
      +'<div class="dn">'+DN[i]+'</div><div class="dnum">'+d.getDate()+'</div>'
      +'<div class="dcnt'+(av===0?' z':'')+'">○'+av+'</div></button>';
  });
  document.getElementById('dtabs').innerHTML=h;
}
function selD(i){sd=i;rTabs();rSlots();}
function rSlots(){
  var days=gw(wk),day=days[sd],ds=fmt(day);
  var a30=S30.filter(function(s){return!R[ds+'_'+s];});
  var a15=S15.filter(function(s){return!R[ds+'_'+s];});
  if(!a30.length&&!a15.length){
    document.getElementById('swrap').innerHTML='<div class="empty"><div style="font-size:40px">📅</div><p>この日は満枠です</p></div>';return;
  }
  var h='<div style="font-size:14px;font-weight:700;color:#2A7A4B;margin-bottom:4px">📅 '+fj(day)+'（'+DN[sd]+'）の空き枠</div>';
  if(a30.length){
    h+='<div class="stitle" style="color:#2A7A4B">🕐 30分枠</div><div class="sgrid">';
    a30.forEach(function(s){h+='<button class="sbtn" onclick="opB(\''+ds+'\',\''+s+'\',\'30\')"><span class="stime">'+s+'</span><span class="scirc">○</span></button>';});
    h+='</div>';
  }
  if(a15.length){
    h+='<div class="stitle" style="color:#E67E22">🕐 15分枠</div><div class="sgrid">';
    a15.forEach(function(s){h+='<button class="sbtn s15" onclick="opB(\''+ds+'\',\''+s+'\',\'15\')"><span class="stime">'+s+'</span><span class="scirc">○</span><span class="smin">15分</span></button>';});
    h+='</div>';
  }
  document.getElementById('swrap').innerHTML=h;
}
function opB(ds,t,dur){
  if(R[ds+'_'+t]){opD(ds,t);return;}
  var p=ds.split('-'),m=parseInt(p[1]),d=parseInt(p[2]);
  var col=dur==='15'?'#E67E22':'#2A7A4B';
  document.getElementById('modal').innerHTML=
    '<div class="mbg" onclick="clM(event)"><div class="mbox">'
    +'<div class="mttl">🚛 搬入予約</div>'
    +'<div class="mtb">📅 '+m+'月'+d+'日（'+DN[sd]+'）<br>🕐 <span style="color:'+col+';font-weight:700">'+t+'〜（'+dur+'分枠）</span></div>'
    +'<label>会社名 <span style="color:#E05B5B">*必須</span></label>'
    +'<input id="ci" type="text" placeholder="例：株式会社○○建設" onkeydown="if(event.key===\'Enter\')dB(\''+ds+'\',\''+t+'\')">'
    +'<div class="mbtns"><button class="mng" onclick="clM()">キャンセル</button>'
    +'<button class="mok" onclick="dB(\''+ds+'\',\''+t+'\')">✅ 予約する</button></div>'
    +'</div></div>';
  setTimeout(function(){var e=document.getElementById('ci');if(e)e.focus();},60);
}
function dB(ds,t){
  var co=(document.getElementById('ci').value||'').trim();
  if(!co){alert('会社名を入力してください');return;}
  R[ds+'_'+t]={co:co};clM();rTabs();rSlots();
  var p=ds.split('-');alert('✅ 予約完了！\n'+parseInt(p[1])+'月'+parseInt(p[2])+'日 '+t+'〜\n'+co);
}
function opD(ds,t){
  var r=R[ds+'_'+t];if(!r)return;
  var p=ds.split('-'),m=parseInt(p[1]),d=parseInt(p[2]);
  var del=isAdm?'<button class="bdel" onclick="dD(\''+ds+'\',\''+t+'\')">🗑 この予約を削除する</button>':'';
  document.getElementById('modal').innerHTML=
    '<div class="mbg" onclick="clM(event)"><div class="mbox">'
    +'<div class="mttl">✅ 予約詳細</div>'
    +'<div class="mtb">📅 '+m+'月'+d+'日（'+DN[sd]+'）<br>🕐 '+t+'〜</div>'
    +'<div class="dbox"><div class="dco">🏢 '+esc(r.co)+'</div><div class="dsub">予約済み</div></div>'
    +del+'<button class="bcls" onclick="clM()">閉じる</button>'
    +'</div></div>';
}
function dD(ds,t){
  if(!confirm('この予約を削除しますか？'))return;
  delete R[ds+'_'+t];clM();rTabs();rSlots();
}
function clM(e){if(!e||e.target.className==='mbg')document.getElementById('modal').innerHTML='';}
upd();
</script>
</body>
</html>
