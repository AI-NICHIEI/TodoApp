<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>搬入予約 - 日榮中間処理場</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#E8F7D0;min-height:100vh}
#app{max-width:1200px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.1)}
.hdr{background:linear-gradient(120deg,#7DBF3A,#5BB8E8);padding:16px 24px;color:#fff;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-text{flex:1}
.hdr h1{font-size:16px;font-weight:700;line-height:1.45}
.hdr p{font-size:11px;opacity:.85;margin-top:3px}
.sync{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;white-space:nowrap}
.sync.ok{background:rgba(255,255,255,.25);color:#fff}
.sync.err{background:#FFCECE;color:#C02020}
.sync.loading{background:rgba(255,255,255,.15);color:#fff}
.week-banner{background:#E8F7D0;border-bottom:2px solid #A8D96A;padding:10px 24px;font-size:13px;font-weight:700;color:#5A9A1F;text-align:center;flex-shrink:0}
.dtabs{display:flex;background:#fff;border-bottom:3px solid #A8D96A;flex-shrink:0}
.dtab{flex:1;padding:12px 4px;text-align:center;cursor:pointer;border:none;background:transparent;border-bottom:4px solid transparent;margin-bottom:-3px;transition:all .15s}
.dtab.on{border-bottom-color:#7DBF3A;background:#E8F7D0}
.dtab:hover:not(.on){background:#F5FCF0}
.dn{font-size:12px;font-weight:700;color:#999}
.dtab.on .dn{color:#5A9A1F}
.dnum{font-size:26px;font-weight:700;color:#333;margin:3px 0}
.dtab.on .dnum{color:#5A9A1F}
.dcnt{font-size:13px;font-weight:700;color:#fff;background:#7DBF3A;border-radius:12px;padding:3px 10px;display:inline-block;margin-top:4px}
.dcnt.z{background:#ddd;color:#999}
.swrap{flex:1;padding:20px 24px;overflow-y:auto}
.day-title{font-size:16px;font-weight:700;color:#5A9A1F;margin-bottom:16px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.sbtn{padding:16px 8px;border-radius:14px;border:2px solid #7DBF3A;background:#fff;cursor:pointer;text-align:center;transition:all .15s;box-shadow:0 2px 6px rgba(125,191,58,.1)}
.sbtn:active{transform:scale(.95)}
.sbtn:hover{background:#E8F7D0}
.stime{font-size:15px;font-weight:700;color:#5A9A1F;display:block}
.scirc{font-size:30px;color:#7DBF3A;display:block;line-height:1.1;margin:4px 0}
.sbtn.s15{border-color:#5BB8E8;box-shadow:0 2px 6px rgba(91,184,232,.1)}
.sbtn.s15:hover{background:#D6F0FF}
.sbtn.s15 .stime{color:#1A6E9A}
.sbtn.s15 .scirc{color:#5BB8E8}
.smin{font-size:10px;font-weight:700;color:#5BB8E8;display:block}
.empty{text-align:center;padding:60px 16px;color:#aaa}
.empty div{font-size:52px;margin-bottom:12px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.52);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.mbox{background:#fff;border-radius:18px;padding:24px;width:100%;max-width:400px;box-shadow:0 16px 60px rgba(0,0,0,.25)}
.mttl{font-size:18px;font-weight:700;color:#5A9A1F;margin-bottom:8px}
.mtb{font-size:14px;font-weight:600;color:#444;background:#E8F7D0;padding:12px 14px;border-radius:10px;margin-bottom:16px;line-height:1.7}
.mbox label{font-size:13px;font-weight:700;color:#555;display:block;margin-bottom:5px}
.mbox input{width:100%;padding:13px;border-radius:10px;border:2px solid #A8D96A;font-size:15px;font-family:inherit;background:#FAFEF4;color:#333;margin-bottom:16px}
.mbox input:focus{outline:none;border-color:#7DBF3A}
.mbtns{display:flex;gap:10px}
.mbtns button{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer}
.mok{background:linear-gradient(120deg,#7DBF3A,#5BB8E8);color:#fff}
.mng{background:#EFEFEF;color:#666}
.bcls{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;background:#EFEFEF;color:#666;margin-top:10px}
.complete-box{background:linear-gradient(135deg,#E8F7D0,#D6F0FF);border:2px solid #7DBF3A;border-radius:14px;padding:24px;text-align:center;margin-bottom:16px}
.complete-box .icon{font-size:48px;display:block;margin-bottom:12px}
.complete-box .main{font-size:18px;font-weight:700;color:#5A9A1F;margin-bottom:8px}
.complete-box .sub{font-size:14px;color:#555;line-height:1.7}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(min-width:600px){
  .hdr h1{font-size:20px}
  .dnum{font-size:30px}
  .dcnt{font-size:14px}
  .sgrid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .sbtn{padding:20px 10px}
  .stime{font-size:17px}
  .scirc{font-size:34px}
}
@media(min-width:1024px){
  .hdr h1{font-size:22px}
  .sgrid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .dtab{padding:16px 6px}
  .dnum{font-size:34px}
}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-text">
      <h1>🚛 日榮中間処理場 産業廃棄物搬入予約</h1>
      <p>受け入れ予約フォーム ｜ 空き枠をタップして予約してください</p>
    </div>
    <span class="sync loading" id="sync-badge"><span class="spinner"></span> 接続中</span>
  </div>
  <div class="week-banner" id="week-banner">読み込み中...</div>
  <div class="dtabs" id="dtabs"></div>
  <div class="swrap" id="swrap"></div>
  <div id="modal"></div>
</div>
<script>
const SUPABASE_URL="https://uzjftccxoipspazrtuvl.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6amZ0Y2N4b2lwc3BhenJ0dXZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NjQ1NTYsImV4cCI6MjA5NTQ0MDU1Nn0.qsXWRTk2hwK4JtIBoNuq-8OXPJYb3-Q4BPugBg2tzd8";
const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:false}});
var R={},sd=0;
var DN=['月','火','水','木','金','土'];
var SLOTS=[
  {t:'08:00',dur:'30'},{t:'08:30',dur:'30'},{t:'09:00',dur:'30'},{t:'09:30',dur:'30'},
  {t:'10:00',dur:'30'},{t:'10:15',dur:'15'},{t:'10:30',dur:'30'},
  {t:'11:00',dur:'30'},{t:'11:15',dur:'15'},{t:'11:30',dur:'30'},
  {t:'13:00',dur:'30'},{t:'13:30',dur:'30'},{t:'13:45',dur:'15'},
  {t:'14:00',dur:'30'},{t:'14:30',dur:'30'},{t:'14:45',dur:'15'},
  {t:'15:00',dur:'30'},{t:'15:30',dur:'30'},{t:'16:00',dur:'30'}
];
function getNextWeekDays(){
  var t=new Date();t.setHours(0,0,0,0);
  var dw=t.getDay(),dn=dw===0?1:8-dw,nm=new Date(t);
  nm.setDate(t.getDate()+dn);
  return Array.from({length:6},function(_,i){var d=new Date(nm);d.setDate(nm.getDate()+i);return d;});
}
function fmt(d){return d.toISOString().split('T')[0];}
function fj(d){return(d.getMonth()+1)+'月'+d.getDate()+'日';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ca(ds){return SLOTS.filter(function(s){return!R[ds+'_'+s.t];}).length;}
function setBadge(s){var b=document.getElementById('sync-badge');if(!b)return;if(s==='ok'){b.className='sync ok';b.innerHTML='☁️ 同期済み';}else if(s==='err'){b.className='sync err';b.innerHTML='⚠️ エラー';}else{b.className='sync loading';b.innerHTML='<span class="spinner"></span> 接続中';}}
async function loadAll(){
  setBadge('loading');
  try{
    var days=getNextWeekDays(),from=fmt(days[0]),to=fmt(days[5]);
    document.getElementById('week-banner').textContent='📅 予約受付期間：'+fj(days[0])+'（月）〜 '+fj(days[5])+'（土）';
    var{data,error}=await db.from('reservations').select('*').gte('date',from).lte('date',to);
    if(error)throw error;
    R={};(data||[]).forEach(function(r){R[r.date+'_'+r.time_slot]={co:r.company,dur:r.duration,id:r.id};});
    setBadge('ok');
  }catch(e){console.error(e);setBadge('err');}
  rTabs();rSlots();
}
function rTabs(){
  var days=getNextWeekDays(),h='';
  days.forEach(function(d,i){
    var ds=fmt(d),av=ca(ds);
    h+='<button class="dtab'+(i===sd?' on':'')+'" onclick="selD('+i+')">'
      +'<div class="dn">'+DN[i]+'</div><div class="dnum">'+d.getDate()+'</div>'
      +'<div><span class="dcnt'+(av===0?' z':'')+'">○'+av+'</span></div>'
      +'</button>';
  });
  document.getElementById('dtabs').innerHTML=h;
}
function selD(i){sd=i;rTabs();rSlots();}
function rSlots(){
  var days=getNextWeekDays(),day=days[sd],ds=fmt(day);
  var avail=SLOTS.filter(function(s){return!R[ds+'_'+s.t];});
  if(!avail.length){document.getElementById('swrap').innerHTML='<div class="empty"><div>📅</div><p>この日は満枠です</p></div>';return;}
  var h='<div class="day-title">📅 '+fj(day)+'（'+DN[sd]+'）の空き枠</div><div class="sgrid">';
  avail.forEach(function(s){
    var is15=s.dur==='15';
    h+='<button class="sbtn'+(is15?' s15':'')+'" onclick="opB(\''+ds+'\',\''+s.t+'\',\''+s.dur+'\')">'
      +'<span class="stime">'+s.t+'</span><span class="scirc">○</span>'
      +(is15?'<span class="smin">15分枠</span>':'')+'</button>';
  });
  h+='</div>';
  document.getElementById('swrap').innerHTML=h;
}
function opB(ds,t,dur){
  if(R[ds+'_'+t])return;
  var p=ds.split('-'),m=parseInt(p[1]),d=parseInt(p[2]);
  var col=dur==='15'?'#1A6E9A':'#5A9A1F';
  document.getElementById('modal').innerHTML=
    '<div class="mbg" onclick="clM(event)"><div class="mbox">'
    +'<div class="mttl">🚛 搬入予約</div>'
    +'<div class="mtb">📅 '+m+'月'+d+'日（'+DN[sd]+'）<br>🕐 <span style="color:'+col+';font-weight:700">'+t+'〜（'+dur+'分枠）</span></div>'
    +'<label>会社名 <span style="color:#E05B5B">*必須</span></label>'
    +'<input id="ci" type="text" placeholder="例：株式会社○○建設" onkeydown="if(event.key===\'Enter\')dB(\''+ds+'\',\''+t+'\',\''+dur+'\')">'
    +'<div class="mbtns"><button class="mng" onclick="clM()">キャンセル</button>'
    +'<button class="mok" id="book-btn" onclick="dB(\''+ds+'\',\''+t+'\',\''+dur+'\')">✅ 予約する</button>'
    +'</div></div></div>';
  setTimeout(function(){var e=document.getElementById('ci');if(e)e.focus();},60);
}
async function dB(ds,t,dur){
  var co=(document.getElementById('ci').value||'').trim();
  if(!co){alert('会社名を入力してください');return;}
  var btn=document.getElementById('book-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> 送信中...';}
  try{
    var{data,error}=await db.from('reservations').insert([{date:ds,time_slot:t,company:co,duration:dur}]).select();
    if(error)throw error;
    R[ds+'_'+t]={co:co,dur:dur,id:data[0].id};
    document.getElementById('modal').innerHTML=
      '<div class="mbg"><div class="mbox"><div class="complete-box">'
      +'<span class="icon">✅</span>'
      +'<div class="main">ご予約を受け付けました</div>'
      +'<div class="sub">営業時間に担当者より<br>折り返しご連絡します</div>'
      +'</div><button class="bcls" onclick="clM()">閉じる</button></div></div>';
    rTabs();rSlots();
  }catch(e){
    if(e.message&&e.message.includes('unique')){alert('この時間枠はすでに予約済みです。');}
    else{alert('エラー: '+e.message);}
    if(btn){btn.disabled=false;btn.innerHTML='✅ 予約する';}
  }
}
function clM(e){if(!e||e.target.className==='mbg')document.getElementById('modal').innerHTML='';}
loadAll();
</script>
</body>
</html>
